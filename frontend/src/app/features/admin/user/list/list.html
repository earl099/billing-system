<div class="max-w-6xl mx-auto p-4 sm:p-6 fade-in">
  <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-6">
    <h2 class="text-2xl font-semibold">User Management</h2>
    <button mat-raised-button color="primary" routerLink="/admin/user/create" class="w-full sm:w-auto motion-smooth">Add User</button>
  </div>

  <div class="mb-4">
    <input
      type="text"
      [value]="searchInput()"
      (input)="searchInput.set($any($event.target).value)"
      placeholder="Search users"
      class="border rounded px-3 py-2 w-full md:w-1/3 motion-smooth"
    />
  </div>

  <mat-card class="p-4 card-animate">
    <div class="overflow-x-auto">
      <table mat-table [dataSource]="paginatedUsers()" class="min-w-full w-max md:w-full">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let u">{{ u.name }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let u">{{ u.role }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let u">
            <div class="flex flex-wrap gap-2">
              <button mat-icon-button (click)="view(u)" title="View" matTooltip="View User" class="min-w-[44px] min-h-[44px] flex items-center justify-center"><mat-icon>visibility</mat-icon></button>
              <button mat-icon-button (click)="edit(u)" title="Edit" matTooltip="Edit User" class="min-w-[44px] min-h-[44px] flex items-center justify-center"><mat-icon>edit</mat-icon></button>
              <button mat-icon-button color="warn" (click)="delete(u)" title="Delete" matTooltip="Delete User" class="min-w-[44px] min-h-[44px] flex items-center justify-center"><mat-icon>delete</mat-icon></button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>
      </table>
    </div>

    <div class="flex flex-wrap justify-start sm:justify-end gap-2 mt-4">
      <button mat-stroked-button (click)="gotoPage(currentPage()-1)" [disabled]="currentPage()===1">Prev</button>
      <span class="px-2 py-1 bg-gray-100 rounded self-center">{{currentPage()}} / {{totalPages()}}</span>
      <button mat-stroked-button (click)="gotoPage(currentPage()+1)" [disabled]="currentPage()===totalPages()">Next</button>
    </div>
  </mat-card>
</div>
