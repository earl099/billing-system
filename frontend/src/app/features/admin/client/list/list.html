<div class="max-w-6xl mx-auto p-4 sm:p-6 fade-in">
  <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-6">
    <h2 class="text-2xl font-semibold">Client Management</h2>
    <button mat-raised-button color="primary" routerLink="/admin/client/create" class="w-full sm:w-auto motion-smooth">Add Client</button>
  </div>
  
  <div class="mb-4">
    <input
      type="text"
      [value]="searchInput()"
      (input)="searchInput.set($any($event.target).value)"
      placeholder="Search clients"
      class="border rounded px-3 py-2 w-full md:w-1/3 motion-smooth"
    />
  </div>

  <mat-card class="p-4 card-animate">
    <div class="overflow-x-auto">
      <table mat-table [dataSource]="paginatedClients()" class="min-w-full w-max md:w-full">
        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let c">{{ c.code }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let c">{{ c.name }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let c">
            <div class="flex flex-wrap gap-2">
              <button mat-icon-button (click)="view(c)" title="View" matTooltip="View Client" class="min-w-[44px] min-h-[44px] flex items-center justify-center"><mat-icon>visibility</mat-icon></button>
              <button mat-icon-button (click)="edit(c)" title="Edit" matTooltip="Edit Client" class="min-w-[44px] min-h-[44px] flex items-center justify-center"><mat-icon>edit</mat-icon></button>
              <button mat-icon-button color="warn" (click)="delete(c)" title="Delete" matTooltip="Delete Client" class="min-w-[44px] min-h-[44px] flex items-center justify-center"><mat-icon>delete</mat-icon></button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>
      </table>
    </div>

    <div class="flex flex-wrap justify-start sm:justify-end gap-2 mt-4">
      <button mat-stroked-button (click)="gotoPage(currentPage()-1)" [disabled]="currentPage()===1 || currentPage()===0">Prev</button>
      <span class="px-2 py-1 bg-gray-100 rounded self-center">{{currentPage()}} / {{totalPages()}}</span>
      <button mat-stroked-button (click)="gotoPage(currentPage()+1)" [disabled]="currentPage()===totalPages() || totalPages()===0">Next</button>
    </div>
  </mat-card>
</div>
