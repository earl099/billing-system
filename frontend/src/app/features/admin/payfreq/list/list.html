<div class="max-w-6xl mx-auto p-4 sm:p-6 fade-in">
  <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-6">
    <h2 class="text-2xl font-semibold">Pay Frequency Management</h2>
    <button mat-raised-button color="primary" routerLink="/admin/payfreq/create" class="w-full sm:w-auto motion-smooth">Add Pay Frequency</button>
  </div>

  <mat-card class="p-4 card-animate">
    <div class="overflow-x-auto">
      <table mat-table [dataSource]="paginatedPayFreqs()" class="min-w-full w-max md:w-full">
        <ng-container matColumnDef="payType">
          <th mat-header-cell *matHeaderCellDef>Pay Type</th>
          <td mat-cell *matCellDef="let p">{{ p.payType }}</td>
        </ng-container>

        <ng-container matColumnDef="delete">
          <th mat-header-cell *matHeaderCellDef>Delete</th>
          <td mat-cell *matCellDef="let p">
            <div class="flex flex-wrap gap-2">
              <button mat-icon-button color="warn" (click)="deletePayFreq(p)" title="Delete" matTooltip="Delete Pay Frequency" [disabled]="isUsed(p)" class="min-w-[44px] min-h-[44px] flex items-center justify-center"><mat-icon>delete</mat-icon></button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>
      </table>
    </div>
  </mat-card>
</div>
