<div class="max-w-full md:max-w-2xl mx-auto p-4 sm:p-6 fade-in">
  <mat-card class="p-4 sm:p-6 card-animate">
    <h3 class="text-xl font-semibold mb-4">Employee Details</h3>

    @for (field of fields; track $index) {
      <p><strong>{{field}}:</strong> {{employee().at($index)}}</p>
    }

    <div class="flex flex-col sm:flex-row sm:justify-evenly gap-3 mt-4">
      <button class="w-full sm:w-auto" mat-raised-button color="primary" (click)="edit()">Edit</button>
      <button class="w-full sm:w-auto" mat-stroked-button (click)="router.navigate([`/manpower/${code}/list`])">Back</button>
    </div>
  </mat-card>
</div>
