<div class="max-w-6xl mx-auto p-6 fade-in">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-semibold">
      {{code()?.toUpperCase()}} Manpower List
    </h2>
    <button mat-raised-button color="primary" (click)="generate()" class="motion-smooth">Generate Employee</button>
  </div>

  <div class="mb-4">
    <input
      type="text"
      [value]="searchInput()"
      (input)="searchInput.set($any($event.target).value)"
      placeholder="Search {{code()?.toUpperCase()}} Manpower"
      class="border rounded px-3 py-2 w-full md:w-1/3 motion-smooth"
    />
  </div>

  @if (loading()) {
    <mat-progress-spinner
      diameter="20"
      mode="indeterminate"
      class="w-auto h-auto">
    </mat-progress-spinner>
  }
  @else {
    <mat-card class="p-4 card-animate">
      <table mat-table [dataSource]="paginatedManpower()" class="w-full">
        <ng-container matColumnDef="empNo">
          <th mat-header-cell *matHeaderCellDef>Employee Number</th>
          <td mat-cell *matCellDef="let b">{{ b.empNo }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let b">{{ b.name }}</td>
        </ng-container>

        <ng-container matColumnDef="posCode">
          <th mat-header-cell *matHeaderCellDef>Position Code</th>
          <td mat-cell *matCellDef="let b">{{ b.posCode }}</td>
        </ng-container>

        <ng-container matColumnDef="posName">
          <th mat-header-cell *matHeaderCellDef>Position Name</th>
          <td mat-cell *matCellDef="let b">{{ b.posName }}</td>
        </ng-container>

        <ng-container matColumnDef="dept">
          <th mat-header-cell *matHeaderCellDef>Department</th>
          <td mat-cell *matCellDef="let b">{{ b.dept }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let b">
            <button mat-icon-button (click)="view(b)" title="View" matTooltip="View Employee Details"><mat-icon>visibility</mat-icon></button>
            <button mat-icon-button (click)="edit(b)" title="Edit" matTooltip="Edit User"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="warn" (click)="delete(b)" title="Delete" matTooltip="Delete Employee"><mat-icon>delete</mat-icon></button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <div class="flex justify-end mt-4 space-x-2">
        <button mat-stroked-button (click)="gotoPage(currentPage()-1)" [disabled]="currentPage()===1 || currentPage()===0">Prev</button>
        <span class="px-2 py-1 bg-gray-100 rounded self-center">{{currentPage()}} / {{totalPages()}}</span>
        <button mat-stroked-button (click)="gotoPage(currentPage()+1)" [disabled]="currentPage()===totalPages() || totalPages()===0">Next</button>
      </div>
    </mat-card>
  }

</div>
